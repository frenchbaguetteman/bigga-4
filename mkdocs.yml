site_name: 69580A Docs
site_description: Competition, motion, and engineering documentation for the 69580A robot codebase
site_url: https://example.invalid/69580a-docs
repo_name: bigga-4
repo_url: https://example.invalid/bigga-4

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
    - toc.follow
  palette:
    - scheme: default
      primary: teal
      accent: amber
  font:
    text: Space Grotesk
    code: JetBrains Mono
  icon:
    repo: material/github

nav:
  - Home: index.md
  - Operators:
      - User Guide: USER_GUIDE.md
      - Motion Reference: MOTION_REFERENCE.md
      - Tutorials: TUTORIALS.md
  - Engineering:
      - API Reference: API_REFERENCE.md
      - Localization Design Rationale: LOCALIZATION_DESIGN_RATIONALE.md
      - Localization Refactoring Summary: LOCALIZATION_REFACTORING_SUMMARY.md
      - Localization Regression Tests: LOCALIZATION_REGRESSION_TESTS.md
      - Implementation Checklist: IMPLEMENTATION_CHECKLIST.md
      - Documentation Map: DOCS_MAP.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search

validation:
  links:
    not_found: ignore

extra_css:
  - assets/stylesheets/extra.css
